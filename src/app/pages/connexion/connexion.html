<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="w-full max-w-md p-8 bg-white rounded-2xl shadow-lg flex flex-col gap-5">

    <fieldset class="border-b pb-4">
      <legend class="text-xl font-semibold text-gray-800">
        🔐 Connexion
      </legend>
    </fieldset>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">

      <!-- Email -->
      <div class="flex flex-col gap-1">
        <p-floatlabel variant="on">
          <input
            pInputText
            id="email"
            type="email"
            formControlName="email"
            class="w-full"
            [invalid]="form.get('email')?.invalid && form.get('email')?.touched"
          />
          <label for="email">Email</label>
        </p-floatlabel>

        @if (form.get('email')?.invalid && form.get('email')?.touched) {
          <p-message severity="error" size="small" variant="simple">
            Email invalide
          </p-message>
        }
      </div>

      <!-- Mot de passe -->
      <div class="flex flex-col gap-1">
        <p-floatlabel variant="on">
          <p-password
            id="password"
            formControlName="password"
            [feedback]="false"
            [toggleMask]="true"
            class="w-full"
            inputStyleClass="w-full"
            [invalid]="form.get('password')?.invalid && form.get('password')?.touched"
          />
          <label for="password">Mot de passe</label>
        </p-floatlabel>
      </div>

      <!-- Erreur globale -->
      @if (erreur) {
        <p-message severity="error" size="small" variant="simple">
          {{ erreur }}
        </p-message>
      }

      <!-- Actions -->
      <div class="flex flex-col gap-3 pt-4 border-t">
        <p-button
          type="submit"
          severity="primary"
          styleClass="w-full"
          [disabled]="form.invalid"
        >
          Se connecter
        </p-button>

        <p class="text-center text-sm text-gray-500">
          Pas encore de compte ?
          <a routerLink="/inscription" class="text-blue-600 hover:underline">
            S'inscrire
          </a>
        </p>
      </div>

    </form>
  </div>
</div>
